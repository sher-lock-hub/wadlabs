<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HTML Tables 101</title>
</head>
<body>
    <section id="simple-table">
        <h2>Simple Table</h2>
        <table border="1">
            <!--the table heading region-->
        <thead>
            <!--row-->
            <tr>
                <!--heading cell-->

            <th>Adm.No.</th>
            <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>200754</td>
                <td>Kerry</td>
            </tr>
            <tr>
                <td>222084</td>
                <td>Eddie</td>
            </tr>
        </tbody>
        </table>
    </section>
    <section id="course-table">
            <h2>Course Table</h2>
            <table border="1">
                <thead>
                 <tr>
                    <th>Semester</th>
                    <th colspan="2">Courses</th>
                 </tr>
                 <tr>
                    <th>BBIT1</th>
                    <th>BBIT2</th>
                 </tr>
                 </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Prog</td>
                        <td>OOP</td>
                    </tr>
                    <tr>
                        <td>DB</td>
                        <td>WAD</td>
                    </tr>
                    <tr>
                        <td>Ethics</td>
                        <td>PA</td>
                    </tr>
 
                </tbody>
            </table>
        </section>
    </body>
</html>
